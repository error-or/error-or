name: Unlist NuGet Package
# Hint: Delete only unlists the package from the NuGet feed. Downloaded packages with this version will still be available for restore.
on:
    workflow_dispatch:
        inputs:
            version:
                description: 'Version to unlist from NuGet feed (e.g. 1.2.3)'
                required: true
                type: string

jobs:
    unlist:
        runs-on: ubuntu-latest
        environment: production
        permissions:
            id-token: write
            contents: read
        steps:
            - uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: 10.0.x
            - name: NuGet login (OIDC -> short-lived API key)
              uses: NuGet/login@v1
              id: nuget-login
              with:
                  user: ${{ secrets.NUGET_USER }}
            - name: Unlist from NuGet
              env:
                  VERSION: ${{ github.event.inputs.version }}
              run: |
                  dotnet nuget delete \
                    ErrorOr \
                    "$VERSION" \
                    --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
                    --source https://api.nuget.org/v3/index.json \
                    --non-interactive
